# Rate limit tiers
#
# requests_per_minute  — sustained rate (tokens refill at this rate)
# burst_capacity       — max tokens in the bucket (handles short spikes)

tiers:
  enterprise:
    requests_per_minute: 120
    burst_capacity: 20

  standard:
    requests_per_minute: 30
    burst_capacity: 10

  free:
    requests_per_minute: 6
    burst_capacity: 3

clients:
  client_a: enterprise
  client_b: enterprise

  client_c: standard
  client_d: standard
  client_e: standard

  client_f: free
  client_g: free
  client_h: free
  client_i: free
  client_j: free
